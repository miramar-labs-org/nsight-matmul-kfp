name: Deploy to KFP

# Compiles pipeline.py, uploads it to Kubeflow Pipelines, and submits a run.
# Prerequisites: KFP must be running on the DGX minikube cluster.
# See: https://github.com/miramar-labs-org/miramar-platform-gcp — Kubeflow Deploy workflow.

on:
  workflow_dispatch:
    inputs:
      run_name:
        description: Display name for the pipeline run
        default: my-pipeline-run
        required: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, dgx]
    timeout-minutes: 30
    outputs:
      run_id: ${{ steps.submit.outputs.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          docker network connect minikube "$(cat /etc/hostname)" 2>/dev/null || true
          sudo chmod -R a+rX "${HOME}/.minikube"
          TMP_KC=$(mktemp)
          sed "s|/home/[^/]*/\.minikube/|${HOME}/.minikube/|g" \
              "${HOME}/.kube/config" > "${TMP_KC}"
          echo "KUBECONFIG=${TMP_KC}" >> "${GITHUB_ENV}"

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Install kfp SDK
        run: pip install kfp --quiet

      - name: Compile and submit pipeline
        id: submit
        env:
          KFP_HOST: http://localhost:8890
          RUN_NAME: ${{ inputs.run_name }}
        run: python3 scripts/deploy_pipeline.py

      - name: Summary
        if: always()
        run: |
          {
            echo "## KFP Pipeline Run"
            echo "| | |"
            echo "|---|---|"
            echo "| Run name | \`${{ inputs.run_name }}\` |"
            echo "| Run ID | \`${{ steps.submit.outputs.run_id }}\` |"
            echo ""
            echo "Open the UI: \`ssh -L 8080:localhost:8080 <user>@spark-79b7.local\` → http://localhost:8080"
          } >> "$GITHUB_STEP_SUMMARY"
